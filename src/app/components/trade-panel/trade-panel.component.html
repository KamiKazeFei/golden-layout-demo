<div class="panel-container">
  <app-panel-header title="дәӨжҳ“">
    <button *ngIf="!isFloating" class="btn-float" (click)="float.emit()">жө®еӢ• (Float)</button>
    <button *ngIf="isFloating" class="btn-dock" (click)="dock.emit()">жӯёдҪҚ (Dock)</button>
  </app-panel-header>
  <div class="panel-body">
    <div class="trade-form">
      <div class="input-group">
        <label>жЁҷзҡ„</label>
        <strong *ngIf="activeSymbol$ | async as symbol">{{ symbol }}</strong>
      </div>
      <div class="order-group">
        <div class="input-group">
          <label>еғ№ж ј</label>
          <input type="number" [value]="tradePrice$ | async" (input)="updatePrice($event)" />
        </div>
        <div class="input-group">
          <label>ж•ёйҮҸ</label>
          <input type="number" [value]="tradeQuantity$ | async" (input)="updateQuantity($event)" />
        </div>
      </div>
      <div class="actions">
        <button class="btn-buy">иІ·йҖІ {{ activeSymbol$ | async }}</button>
        <button class="btn-sell">иіЈеҮә {{ activeSymbol$ | async }}</button>
      </div>
    </div>
  </div>
</div>
