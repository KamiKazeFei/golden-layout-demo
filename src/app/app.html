<div class="app-layout">
  <div class="header-tool" style="position: relative">
    <span>header tool</span>
    <button
      *ngIf="(isReportClosed$ | async) || (isReportFloating$ | async)"
      (click)="reopenReport()"
      class="action-btn"
      style="margin-left: 10px"
    >
      回復報表
    </button>
    <button (click)="swapPanels()" class="action-btn" style="position: absolute; right: 20px">
      左右互換
    </button>
  </div>
  <div class="main-content" #glRoot></div>
  <div class="footer-tool">
    footer tool
    <button
      *ngIf="(isReportClosed$ | async) || (isReportFloating$ | async)"
      (click)="reopenReport()"
      class="action-btn"
    >
      重新開啟報表
    </button>
  </div>

  <!-- Floating Trade Panel -->
  <div
    *ngIf="isTradeFloating$ | async"
    class="floating-trade-panel mat-elevation-z4"
    cdkDrag
    cdkDragBoundary=".app-layout"
    [ngStyle]="tradeFloatingStyles"
  >
    <div class="floating-wrapper" style="height: 100%; display: flex; flex-direction: column">
      <div
        class="floating-drag-handle"
        cdkDragHandle
        style="
          cursor: move;
          background: #222;
          padding: 5px;
          text-align: center;
          font-size: 10px;
          color: #666;
        "
      >
        ::: 拖曳此處移動 :::
      </div>
      <div style="flex: 1">
        <app-trade-panel [isFloating]="true" (dock)="dockTrade()"> </app-trade-panel>
      </div>
    </div>
  </div>

  <!-- Floating Report Panel -->
  <div
    *ngIf="isReportFloating$ | async"
    class="floating-report-panel mat-elevation-z4"
    cdkDrag
    cdkDragBoundary=".app-layout"
    [ngStyle]="reportFloatingStyles"
  >
    <div class="floating-wrapper" style="height: 100%; display: flex; flex-direction: column">
      <div
        class="floating-drag-handle"
        cdkDragHandle
        style="
          cursor: move;
          background: #222;
          padding: 5px;
          text-align: center;
          font-size: 10px;
          color: #666;
        "
      >
        ::: 拖曳此處移動 (報表) :::
      </div>
      <div style="flex: 1">
        <app-report-panel [isFloating]="true" (close)="isReportFloating$.next(false)" (dock)="dockReport()">
        </app-report-panel>
      </div>
    </div>
  </div>
</div>
